<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engineering Notes Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Noto+Sans+JP:wght@300;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
    --bg-dark: #0f172a;
    --card-bg: #1e293b;
    --accent-blue: #38bdf8;
    --accent-green: #4ade80;
    --text-main: #f1f5f9;
    --text-sub: #94a3b8;
}
body {
    background-color: var(--bg-dark);
    color: var(--text-main);
    font-family: 'Noto Sans JP', sans-serif;
    margin: 0;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}
header {
    padding: 60px 5% 100px;
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
    border-bottom: 2px solid var(--accent-blue);
}
.hero-title {
    font-size: 2.2rem;
    font-weight: 700;
    margin: 0;
    background: linear-gradient(to right, var(--accent-blue), var(--accent-green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.principles-typing {
    font-family: 'Fira Code', monospace;
    color: var(--accent-green);
    font-size: 1rem;
    margin-top: 15px;
    height: 1.5em;
}
.dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    padding: 0 5% 60px;
    margin-top: -40px;
}
.card {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 25px;
    border: 1px solid #334155;
    transition: 0.3s;
    cursor: pointer;
    transform-style: preserve-3d;
}
.card:hover {
    border-color: var(--accent-blue);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.tag {
    font-size: 0.7rem;
    background: #334155;
    padding: 4px 8px;
    border-radius: 4px;
    color: var(--accent-blue);
}
#md-modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(15, 23, 42, 0.98);
    z-index: 1000;
    overflow-y: auto;
    padding: 40px 5%;
    backdrop-filter: blur(10px);
}
.modal-content {
    max-width: 900px;
    margin: 0 auto;
    background: #1e293b;
    padding: 50px;
    border-radius: 16px;
    border: 1px solid #334155;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}
.close-btn {
    position: sticky;
    top: 0;
    float: right;
    background: #334155;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    z-index: 1001;
}
#md-content {
    line-height: 1.8;
    letter-spacing: 0.05em;
}
#md-content p, #md-content li { margin-bottom: 1.5em; }
#md-content li { margin-left: 1.2em; }
#md-content h1, #md-content h2, #md-content h3 { margin-top: 2em; margin-bottom: 1em; }
#md-content h1, #md-content h2 { border-bottom: 1px solid var(--accent-blue); padding-bottom: 10px; color: var(--accent-blue); }
#md-content code { background: #0f172a; padding: 2px 5px; border-radius: 4px; color: var(--accent-green); font-family: 'Fira Code', monospace; }
#md-content pre { background: #0f172a; padding: 20px; border-radius: 8px; overflow-x: auto; border: 1px solid #334155; margin: 20px 0; line-height: 1.5; }
#md-content a { color: var(--accent-green); }
footer { text-align: center; padding: 40px; color: var(--text-sub); font-size: 0.8rem; }
</style>
</head>
<body>
<header>
    <h1 class="hero-title">Engineering Notes Dashboard</h1>
    <div id="typewriter" class="principles-typing"></div>
</header>
<main class="dashboard"></main>
<div id="md-modal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal()">CLOSE [ESC]</button>
        <div id="md-content">読み込み中...</div>
    </div>
</div>
<div style="text-align:center; margin-top: 15px;">
    <button id="lang-toggle" onclick="toggleLang()" style="padding:10px 20px; border-radius:20px; border:none; cursor:pointer; background:#334155; color:white;">日本語｜ENGLISH</button>
</div>
<footer>
    <p>© 2026 matsusan | System Dashboard Operating</p>
</footer>
<script>
const fileMapJP = {
    'principles': [{ name: '品質の定義（完成は静止画）', path: './principles/concept-of-quality.md' }],
    'strategy': [{ name: '2026年3月 戦略要諦', path: './README.md' }],
    'patterns': [{ name: 'JSハック：文字化け回避', path: './patterns/BLOGGER_JS_HACK.md' }],
    'tech': [{ name: 'ページネーションハック', path: './tech/blogger-pagination.md' }]
};
const fileMapEN = {
    'principles': [{ name: 'Definition of Quality', path: './en/principles/concept-of-quality-en.md' }],
    'strategy': [{ name: 'READ ME', path: './en/README-en.md' }],
    'patterns': [{ name: '[Pattern] JS Hack', path: './en/patterns/BLOGGER_JS_HACK-en.md' }],
    'tech': [{ name: 'Pagination Hack', path: './en/tech/blogger-pagination-en.md' }]
};
const categoryMetaJP = {
    'principles': { title: 'Design Principles', tag: '思想', desc: 'Bloggerを「表現の庭」へと昇華させるための設計思想。' },
    'strategy': { title: 'Strategic Updates', tag: '戦略', desc: '2026年、ボット襲撃を乗り越えた先にある運営戦略。' },
    'patterns': { title: 'Design Patterns', tag: '実装', desc: 'Bloggerで実現する、具体的かつ再利用可能な実装パターン。' },
    'tech': { title: 'Technical Hacks', tag: '技術', desc: '標準機能の限界を突破する、JavaScript主体の技術検証。' }
};
const categoryMetaEN = {
    'principles': { title: 'Design Principles', tag: 'Principles', desc: 'Archives of design principles for Blogger.' },
    'strategy': { title: 'Strategic Updates', tag: 'Strategy', desc: 'Operational strategies in 2026.' },
    'patterns': { title: 'Design Patterns', tag: 'Patterns', desc: 'Reusable implementation patterns for Blogger.' },
    'tech': { title: 'Technical Hacks', tag: 'Tech', desc: 'Technical hacks and JS experiments.' }
};
let currentLang = 'JP';
function toggleLang() {
    currentLang = currentLang === 'JP' ? 'EN' : 'JP';
    renderDashboard();
}
function getLangIcon(file) { return (currentLang==='EN')?'🇺🇸':'🇯🇵'; }
function renderDashboard() {
    const container = document.querySelector('.dashboard');
    container.innerHTML = '';
    const activeMap = currentLang==='JP'?fileMapJP:fileMapEN;
    const activeMeta = currentLang==='JP'?categoryMetaJP:categoryMetaEN;
    const allFiles = Object.entries(activeMap).flatMap(([cat,files])=>files.map(f=>({...f,category:cat})));
    const recentFiles = allFiles.slice(-3).reverse();
    let recentHTML = `<div class="card recent-card" style="grid-column:1/-1; border-color:var(--accent-green); background:rgba(74,222,128,0.05);">
        <span class="tag" style="background:var(--accent-green); color:var(--bg-dark);">NEW UPDATES</span>
        <h2>📡 最近の防衛記録</h2>
        <div style="display:flex; gap:15px; margin-top:15px; overflow-x:auto; padding-bottom:10px;">
        ${recentFiles.map(f=>`<button onclick="openMD('${f.path}')" style="background:#334155;color:white;border:1px solid var(--accent-green);padding:10px 20px;border-radius:20px;cursor:pointer;white-space:nowrap;" onmouseover="this.style.background='var(--accent-green)';this.style.color='var(--bg-dark)'" onmouseout="this.style.background='#334155';this.style.color='white'">${getLangIcon(f)} ${f.name}</button>`).join('')}
        </div></div>`;
    container.insertAdjacentHTML('beforeend', recentHTML);
    Object.keys(activeMap).forEach(cat=>{
        const meta = activeMeta[cat];
        let cardHTML = `<div class="card" onclick="showFileList('${cat}')"><span class="tag">${meta.tag}</span><h2>${meta.title}</h2><p>${meta.desc}</p></div>`;
        container.insertAdjacentHTML('beforeend', cardHTML);
    });
}
renderDashboard();
async function openMD(path) {
    const modal=document.getElementById('md-modal');
    const content=document.getElementById('md-content');
    modal.style.display='block';
    document.body.style.overflow='hidden';
    content.innerHTML="読み込み中...";
    gsap.fromTo(".modal-content",{y:30,opacity:0},{y:0,opacity:1,duration:0.4});
    try{
        const response=await fetch(path);
        const text=await response.text();
        content.innerHTML=marked.parse(text);
        modal.scrollTop=0;
    }catch(e){
        content.innerHTML=`<h1>404</h1><p>見つかりません: ${path}</p>`;
    }
}
function showFileList(category){
    const activeMap=currentLang==='JP'?fileMapJP:fileMapEN;
    const files=activeMap[category];
    const content=document.getElementById('md-content');
    if(!files||files.length===0){
        content.innerHTML=`<div style="text-align:center; padding:50px 20px;"><h2>COMING SOON...</h2></div>`;
    }else{
        let listHTML=`<h1>${category.toUpperCase()}</h1><ul style="list-style:none; padding:20px 0;">`;
        files.forEach(f=>{
            listHTML+=`<li style="margin-bottom:15px;border:1px solid #334155;border-radius:8px;background: rgba(255,255,255,0.03);">
                <a href="javascript:void(0)" onclick="openMD('${f.path}')" style="font-size:1.1rem;text-decoration:none;color:var(--accent-green);display:block;padding:15px;">
                ${getLangIcon(f)} ${f.name}</a></li>`;
        });
        content.innerHTML=listHTML+'</ul>';
    }
    document.getElementById('md-modal').style.display='block';
    document.body.style.overflow='hidden';
    gsap.fromTo(".modal-content",{y:30,opacity:0},{y:0,opacity:1,duration:0.4});
}
function closeModal(){
    document.body.style.overflow='auto';
    gsap.to(".modal-content",{y:50,opacity:0,duration:0.3,onComplete:()=>{document.getElementById('md-modal').style.display='none';}});
}
document.addEventListener('keydown',(e)=>{if(e.key==="Escape")closeModal();});
const phrases=["完成は静止画である。","デザインとUXの等価交換。","実装正義：動けばヨシ！","Engineering Notes Dashboard V1.1"];
let phraseIdx=0;
function updateTypewriter(){
    const typewriter=document.getElementById('typewriter');
    if(typewriter){
        typewriter.innerText=phrases[phraseIdx % phrases.length];
        gsap.fromTo("#typewriter",{opacity:0},{opacity:1,duration:1});
        phraseIdx++;
    }
}
setInterval(updateTypewriter,4000);
updateTypewriter();
</script>
</body>
</html>
