<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OGP画像ジェネレーター</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

  :root {
    --brand: #0f2b46;
    --accent: #3391ff;
    --bg: #f6f5f5;
    --white: #ffffff;
    --border: #ddd;
    --text: #333;
    --light: #999;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 30px 20px;
  }

  h1 {
    text-align: center;
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--brand);
    margin-bottom: 6px;
  }

  .subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: var(--light);
    margin-bottom: 30px;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 24px;
    align-items: start;
  }

  .panel {
    background: var(--white);
    border-radius: 8px;
    padding: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .panel h2 {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--brand);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--brand);
  }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }

  .field input[type="text"],
  .field input[type="url"],
  .field textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 0.85rem;
    font-family: inherit;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus,
  .field textarea:focus {
    border-color: var(--accent);
  }

  .field textarea {
    resize: vertical;
    min-height: 60px;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .field input[type="color"] {
    width: 100%;
    height: 36px;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    padding: 2px;
  }

  .field input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
  }

  .field .range-val {
    font-size: 0.75rem;
    color: var(--light);
    text-align: right;
    margin-top: 2px;
  }

  .btn-generate {
    width: 100%;
    padding: 12px;
    background: var(--brand);
    color: var(--white);
    border: none;
    border-radius: 4px;
    font-size: 0.95rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 8px;
  }

  .btn-generate:hover {
    background: #1a3f5c;
  }

  .preview-panel {
    background: var(--white);
    border-radius: 8px;
    padding: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .preview-panel h2 {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--brand);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--brand);
  }

  .canvas-wrapper {
    width: 100%;
    aspect-ratio: 1200 / 630;
    background: #eee;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  .btn-download {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: var(--white);
    border: none;
    border-radius: 4px;
    font-size: 0.95rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 14px;
  }

  .btn-download:hover {
    background: #1a6fd4;
  }

  .size-note {
    text-align: center;
    font-size: 0.75rem;
    color: var(--light);
    margin-top: 8px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }

  @media (max-width: 700px) {
    .container {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>

<h1>OGP画像ジェネレーター</h1>
<p class="subtitle">1200 × 630px のOGP画像をブラウザで生成・ダウンロードできます</p>

<div class="container">
  <!-- 入力パネル -->
  <div class="panel">
    <h2>⚙️ 設定</h2>

    <div class="field">
      <label>背景画像URL</label>
      <input type="url" id="bgUrl" placeholder="https://example.com/image.jpg">
    </div>

    <div class="field">
      <label>オーバーレイの濃さ</label>
      <input type="range" id="overlayOpacity" min="0" max="90" value="45" oninput="document.getElementById('overlayVal').textContent=this.value+'%'">
      <div class="range-val" id="overlayVal">45%</div>
    </div>

    <div class="field">
      <label>オーバーレイ色</label>
      <input type="color" id="overlayColor" value="#000000">
    </div>

    <div class="divider"></div>

    <div class="field">
      <label>メインタイトル（大）</label>
      <textarea id="mainTitle" placeholder="例：カスタマイズ全記録">Blogger JSON Feed
を使い倒す</textarea>
    </div>

    <div class="field">
      <label>サブタイトル（小）</label>
      <input type="text" id="subTitle" placeholder="例：Materiapollo" value="静的ブログに動的UIを生やす全パターン集">
    </div>

    <div class="field">
      <label>サイト名</label>
      <input type="text" id="siteName" value="Blogger TIPS | matsusanjpn">
    </div>

    <div class="divider"></div>

    <div class="field-row">
      <div class="field">
        <label>メインタイトル色</label>
        <input type="color" id="mainColor" value="#ffffff">
      </div>
      <div class="field">
        <label>サブタイトル色</label>
        <input type="color" id="subColor" value="#7dd3fc">
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>サイト名色</label>
        <input type="color" id="siteColor" value="#ccddee">
      </div>
      <div class="field">
        <label>メインフォントサイズ</label>
        <input type="range" id="mainFontSize" min="40" max="120" value="80" oninput="document.getElementById('mainFontVal').textContent=this.value+'px'">
        <div class="range-val" id="mainFontVal">80px</div>
      </div>
    </div>

    <button class="btn-generate" onclick="generate()">▶ プレビュー生成</button>
  </div>

  <!-- プレビューパネル -->
  <div class="preview-panel">
    <h2>👁 プレビュー</h2>
    <div class="canvas-wrapper">
      <canvas id="ogpCanvas" width="1200" height="630"></canvas>
    </div>
    <button class="btn-download" onclick="download()">⬇ PNG ダウンロード</button>
    <p class="size-note">出力サイズ：1200 × 630px</p>
  </div>
</div>

<script>
const canvas = document.getElementById('ogpCanvas');
const ctx = canvas.getContext('2d');

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const lines = text.split('\n');
  let totalLines = [];
  lines.forEach(line => {
    const words = line.split('');
    let currentLine = '';
    words.forEach(char => {
      const testLine = currentLine + char;
      if (ctx.measureText(testLine).width > maxWidth && currentLine !== '') {
        totalLines.push(currentLine);
        currentLine = char;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) totalLines.push(currentLine);
  });

  const totalHeight = totalLines.length * lineHeight;
  let startY = y - totalHeight / 2;
  totalLines.forEach(line => {
    ctx.fillText(line, x, startY);
    startY += lineHeight;
  });
}

function generate() {
  const W = 1200, H = 630;
  ctx.clearRect(0, 0, W, H);

  // 背景
  const bgUrl = document.getElementById('bgUrl').value.trim();
  const overlayOpacity = parseInt(document.getElementById('overlayOpacity').value) / 100;
  const overlayColor = document.getElementById('overlayColor').value;
  const mainTitle = document.getElementById('mainTitle').value;
  const subTitle = document.getElementById('subTitle').value;
  const siteName = document.getElementById('siteName').value;
  const mainColor = document.getElementById('mainColor').value;
  const subColor = document.getElementById('subColor').value;
  const siteColor = document.getElementById('siteColor').value;
  const mainFontSize = parseInt(document.getElementById('mainFontSize').value);

  const draw = () => {
    // オーバーレイ
    ctx.fillStyle = hexToRgba(overlayColor, overlayOpacity);
    ctx.fillRect(0, 0, W, H);

    // 左側のアクセントライン
    ctx.fillStyle = '#3391ff';
    ctx.fillRect(0, 0, 8, H);

    // サブタイトル
    ctx.font = `700 32px 'Noto Sans JP', sans-serif`;
    ctx.fillStyle = subColor;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(subTitle, 80, 220);

    // メインタイトル
    ctx.font = `900 ${mainFontSize}px 'Noto Sans JP', sans-serif`;
    ctx.fillStyle = mainColor;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';

    const lines = mainTitle.replace(/\\n/g, '\n').split('\n');
    let startY = 260;
    lines.forEach(line => {
      ctx.fillText(line, 80, startY);
      startY += mainFontSize * 1.2;
    });

    // サイト名（右下）
    ctx.font = `400 24px 'Noto Sans JP', sans-serif`;
    ctx.fillStyle = siteColor;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    ctx.fillText(siteName, W - 40, H - 36);

    // 下部ライン
    ctx.fillStyle = '#3391ff';
    ctx.fillRect(0, H - 6, W, 6);
  };

  if (bgUrl) {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      // 背景画像をカバー
      const scale = Math.max(W / img.width, H / img.height);
      const sw = img.width * scale;
      const sh = img.height * scale;
      const sx = (W - sw) / 2;
      const sy = (H - sh) / 2;
      ctx.drawImage(img, sx, sy, sw, sh);
      draw();
    };
    img.onerror = () => {
      ctx.fillStyle = '#1a2a3a';
      ctx.fillRect(0, 0, W, H);
      draw();
    };
    img.src = bgUrl;
  } else {
    // 背景なし→グラデーション
    const grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0, '#0f2b46');
    grad.addColorStop(1, '#1a4a6e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    draw();
  }
}

function download() {
  const link = document.createElement('a');
  link.download = 'ogp.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// 初期プレビュー
generate();
</script>
</body>
</html>
